name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci_test_secret_key_for_testing_only
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run server linter
        run: npm run lint --prefix server || true

      - name: Run server tests
        run: npm run test:ci --prefix server

      - name: Build server
        run: npm run build --prefix server

      - name: Start server
        run: |
          node server/dist/index.js &
          for i in {1..10}; do
            if curl -sSf http://localhost:5000/api/ping >/dev/null; then
              echo Server ready && break
            fi
            sleep 1
          done

      - name: Run smoke tests
        run: npm --prefix server run smoke

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run client linter
        run: npm run lint --prefix client || true

      - name: Run client tests
        run: npm run test --prefix client -- --run

      - name: Build client
        run: npm run build --prefix client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist

  docker-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.REGISTRY_USERNAME && secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push server image
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/server:latest ./server
          docker push ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/server:latest

      - name: Build and push client image
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/client:latest ./client
          docker push ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/client:latest
