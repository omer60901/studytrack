version: '3.8'
services:
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/studytrack
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - '3000:80'
    depends_on:
      - server

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
